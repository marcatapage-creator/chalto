version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    groups:
      dev-tools:
        patterns:
          - "eslint*"
          - "prettier*"
          - "@vitest/*"
          - "vitest"
          - "playwright"
          - "@playwright/*"
      supabase:
        patterns:
          - "@supabase/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
