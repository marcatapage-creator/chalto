name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type check, lint & tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test -- --coverage
        env:
          # Valeurs fictives pour que les imports ne crashent pas au chargement
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          RESEND_API_KEY: placeholder
          NEXT_PUBLIC_APP_URL: https://localhost:3000
          UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
          UPSTASH_REDIS_REST_TOKEN: placeholder

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          RESEND_API_KEY: placeholder
          NEXT_PUBLIC_APP_URL: https://localhost:3000
          UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
          UPSTASH_REDIS_REST_TOKEN: placeholder
          SENTRY_AUTH_TOKEN: placeholder

  e2e:
    name: Tests e2e (Playwright)
    runs-on: ubuntu-latest
    # Tourne uniquement si les secrets E2E sont configurés sur le repo
    if: ${{ vars.E2E_ENABLED == 'true' }}
    needs: check

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          # Pointe vers le site déployé — pas de serveur local nécessaire
          BASE_URL: https://www.chalto.fr
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_PROJECT_ID: ${{ secrets.E2E_PROJECT_ID }}
          E2E_INVITE_TOKEN: ${{ secrets.E2E_INVITE_TOKEN }}
          E2E_INVITE_TOKEN_VALIDATION: ${{ secrets.E2E_INVITE_TOKEN_VALIDATION }}
          E2E_INVITE_TOKEN_TRANSMISSION: ${{ secrets.E2E_INVITE_TOKEN_TRANSMISSION }}
          E2E_VALIDATION_TOKEN: ${{ secrets.E2E_VALIDATION_TOKEN }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
